<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroChain | Mercado Pro 2027</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">🚜 AgroChain Pro</div>
        <div class="user-status">
            👤 <span id="display-name">---</span> | 💰 $<span id="display-cacaos">0</span>
        </div>
    </header>

    <div class="container">
        <section class="card">
            <h3>⚙️ Perfil de Finca</h3>
            <input type="text" id="input-name" placeholder="Nombre de tu Empresa">
            <input type="number" id="input-cacaos" placeholder="Saldo en Moneda Nacional">
            <button onclick="app.initUser()">Activar Cuenta</button>
        </section>

        <section class="card">
            <h3>🚚 Mercado Agroindustrial (Entrega a Domicilio)</h3>
            <div id="market-grid" class="grid">
                </div>
        </section>

        <section class="card">
            <h3>📑 Registro de Operaciones</h3>
            <ul id="history-log" style="list-style:none; padding:0; font-size:0.8rem;"></ul>
        </section>
    </div>

    <script src="auth.js"></script>
    <script src="inventory.js"></script>
    <script src="main.js"></script>
</body>
</html>
